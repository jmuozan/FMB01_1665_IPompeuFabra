      .info-content {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 27px;
        min-height: calc(100vh - 140px);
      }

      .info-title {
        font-size: 2.5rem;
        font-weight: 700;
        color: #222121;
        margin-bottom: 1.5rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      .info-section {
        margin-bottom: 2.5rem;
      }

      .info-section h2 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #222121;
        margin-bottom: 1rem;
        margin-top: 2rem;
      }

      .info-section h3 {
        font-size: 1.3rem;
        font-weight: 500;
        color: #444;
        margin-bottom: 0.75rem;
        margin-top: 1.5rem;
      }

      .info-section p {
        font-size: 1rem;
        color: rgba(34, 33, 33, 0.85);
        line-height: 1.7;
        margin-bottom: 1rem;
      }

      .info-section ul {
        margin-left: 1.5rem;
        margin-bottom: 1rem;
      }

      .info-section li {
        font-size: 1rem;
        color: rgba(34, 33, 33, 0.85);
        line-height: 1.7;
        margin-bottom: 0.5rem;
      }

      .info-divider {
        border: none;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        margin: 2rem 0;
      }

      @media (max-width: 1023px) {
        .info-content {
          padding: 1.5rem 20px;
        }

        .info-title {
          font-size: 2rem;
        }

        .info-section h2 {
          font-size: 1.5rem;
        }

        .info-section h3 {
          font-size: 1.2rem;
        }
      }

      @media (max-width: 530px) {
        .info-content {
          padding: 1rem 15px;
        }

        .info-title {
          font-size: 1.75rem;
        }

        .info-section h2 {
          font-size: 1.3rem;
        }

        .info-section h3 {
          font-size: 1.1rem;
        }

        .info-section p,
        .info-section li {
          font-size: 0.95rem;
        }
      }
